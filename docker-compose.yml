version: "3.9"

services:
    backend:
        build:
            context: .
            dockerfile: backend/Dockerfile
        ports:
            - "8000:8000"
        env_file:
            - ./backend/.env
        environment:
            - MCP_BASE_URL=http://mcp:8001
        depends_on:
            - mcp
        volumes:
            - ./data:/app/data

    mcp:
        build: ./mcp-server
        ports:
            - "8001:8001"
        env_file:
            - ./mcp-server/.env
